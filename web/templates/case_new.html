{% extends "base.html" %}
{% block title %}OPEN NEW CASE{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <div class="mb-8">
    <a href="/" class="mono text-xs text-zinc-600 hover:text-zinc-400 transition-colors flex items-center gap-1 mb-4">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      DASHBOARD
    </a>
    <h1 class="text-xl font-bold text-zinc-100 tracking-tight">Open New Case</h1>
    <p class="text-zinc-500 text-sm mt-1">Initialise a case file. Research can be added incrementally.</p>
  </div>

  <form method="post" action="/cases/new" class="space-y-5">

    <div class="card p-6 space-y-5">
      <div>
        <label class="label">Subject / Target Name</label>
        <input type="text" name="name" class="input" placeholder="e.g. Project MKUltra, Cold Fusion Research, ..." required autofocus>
        <p class="text-zinc-600 text-xs mt-1.5 mono">This becomes the primary search query for all research runs.</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label">Subject Type</label>
          <select name="subject_type" class="select">
            <option value="topic">Topic</option>
            <option value="person">Person</option>
            <option value="organization">Organization</option>
            <option value="event">Event</option>
            <option value="technology">Technology</option>
            <option value="location">Location</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="label">Priority</label>
          <select name="priority" class="select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>

      <div>
        <label class="label">Description / Brief</label>
        <textarea name="description" class="input" placeholder="What are you investigating? What do you already know? Any specific angles to pursue?"></textarea>
      </div>

      <div>
        <label class="label">Tags <span class="text-zinc-700">(comma-separated)</span></label>
        <input type="text" name="tags" class="input" placeholder="e.g. government, declassified, 1970s">
      </div>
    </div>

    <div class="flex items-center justify-between">
      <a href="/" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Open Case File
      </button>
    </div>

  </form>
</div>
{% endblock %}
